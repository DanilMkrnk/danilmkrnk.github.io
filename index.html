<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <v2>Портфоліо - Мокренко Данил</v2>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<nav class="navbar">
  <div class="container">
    <div class="logo">Моє Портфоліо</div>
    <ul class="nav-links">
      <li><a href="#home">Головна</a></li>
      <li><a href="#about">Про мене</a></li>
      <li><a href="#skills">Навички</a></li>
      <li><a href="#projects">Проєкти</a></li>
      <li><a href="#contact">Контакти</a></li>
    </ul>
    <div class="burger">
      <div class="line1"></div>
      <div class="line2"></div>
      <div class="line3"></div>
    </div>
  </div>
</nav>

<section id="home" class="hero">
  <div class="container">
    <h1>Привіт, я Мокренко Данил Дмитрович!</h1>
    <p>Навчаюсь у ХНТУ на 122 спеціальності "Комп'ютерні науки"</p>
    <a href="#" class="btn">Зав'язати</a>
  </div>
</section>
<section id="contact" class="contact">
  <div class="container">
    <h2>Контакти</h2>
    
    <form name="contact" method="POST" data-netlify="true" action="/thank-you" class="contact-form">
      <input type="hidden" name="form-name" value="contact">
      
      <div class="form-group">
        <input type="text" name="name" placeholder="Ваше ім'я" required>
      </div>
      
      <div class="form-group">
        <input type="email" name="email" placeholder="Ваш email" required>
      </div>
      
      <div class="form-group">
        <textarea name="message" placeholder="Ваше повідомлення" rows="5" required></textarea>
      </div>
      
      <button type="submit" class="btn">Надіслати</button>
    </form>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
